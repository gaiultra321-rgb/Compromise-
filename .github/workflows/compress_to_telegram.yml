name: Mediafire to Telegram Ultra Compress

on:
  workflow_dispatch:
    inputs:
      bot_token:
        description: 'Enter Telegram Bot Token'
        required: true
      api_id:
        description: 'Enter Telegram API ID'
        required: true
      api_hash:
        description: 'Enter Telegram API Hash'
        required: true
      mediafire_link:
        description: 'Mediafire Direct Download Link'
        required: true

jobs:
  compress_and_send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Tools & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full wget python3-pip
          pip3 install telethon

      - name: Download File from Mediafire
        run: |
          # মিডিয়াফায়ার ডাইরেক্ট লিঙ্ক ব্যবহার করে ডাউনলোড
          wget -O game_input.zip "${{ github.event.inputs.mediafire_link }}"

      - name: Unzip Original File
        run: |
          mkdir extracted_files
          7z x game_input.zip -oextracted_files/

      - name: Ultra Compress to 7z
        run: |
          # 7-Zip Ultra Compression সেটিংস
          # -mx=9 (Ultra), -md=128m (Dict size), -ms=on (Solid)
          7z a -t7z -m0=lzma2 -mx=9 -md=128m -ms=on compressed_game.7z ./extracted_files/*

      - name: Send to Telegram
        env:
          BOT_TOKEN: ${{ github.event.inputs.bot_token }}
          API_ID: ${{ github.event.inputs.api_id }}
          API_HASH: ${{ github.event.inputs.api_hash }}
        run: |
          python3 - <<EOF
          import os
          import asyncio
          from telethon import TelegramClient

          async def main():
              api_id = int(os.environ['API_ID'])
              api_hash = os.environ['API_HASH']
              bot_token = os.environ['BOT_TOKEN']
              
              client = TelegramClient('bot', api_id, api_hash)
              await client.start(bot_token=bot_token)
              
              file_path = 'compressed_game.7z'
              if os.path.exists(file_path):
                  print(f"Uploading {file_path} to Telegram...")
                  # 'me' মানে আপনার নিজের সেভড মেসেজে যাবে
                  await client.send_file('me', file_path, caption="✅ Ultra Compressed File Completed!")
                  print("Upload successful!")
              else:
                  print("Error: Compressed file not found!")

          asyncio.run(main())
          EOF
          
