name: RDP + Tailscale + RustDesk + Telegram (Direct)

on:
  workflow_dispatch:
    inputs:
      ts_tailnet:         { description: "Tailscale tailnet", required: true }
      ts_api_key:         { description: "Tailscale API key", required: true }
      ts_authkey:         { description: "Tailscale Auth key", required: true }
      
      # Telegram Inputs
      tg_bot_token:       { description: "Telegram Bot Token", required: true }
      tg_chat_id:         { description: "Telegram Chat ID (Manual)", required: true }

      runtime_minutes:    { description: "Runtime (max 360)", required: false, default: "355" }
      cycles:             { description: "Auto Restart Cycles (0-10)", required: false, default: "0" }
      rdp_count:          { description: "Instances (1-10)", required: false, default: "1" }
      crd_code:           { description: "CRD Code (Optional)", required: false, default: "" }
      crd_pin:            { description: "CRD PIN", required: false, default: "123456" }

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: pwsh

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
    steps:
      - id: mk
        run: |
          $n = [int]"${{ inputs.rdp_count }}"; if ($n -lt 1) { $n = 1 }; if ($n -gt 10) { $n = 10 }
          $inc = @(); for ($i=1; $i -le $n; $i++){ $inc += @{ id = $i } }
          $json = @{ include = $inc } | ConvertTo-Json -Compress
          "matrix=$json" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

  rdp:
    needs: setup
    runs-on: windows-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      max-parallel: 10
    timeout-minutes: 370
    env:
      RDP_USER: Bullettemporary
      RDP_PASS: Bullet@12345

    steps:
      - name: Hostname & Runtime Setup
        run: |
          if ("${{ inputs.rdp_count }}" -gt 1) { $hn = "bullet${{ matrix.id }}" } else { $hn = "bullet" }
          "TS_HOSTNAME=$hn" | Out-File -Append $env:GITHUB_ENV
          $rt = [int]"${{ inputs.runtime_minutes }}"; if ($rt -lt 5) { $rt = 355 }
          "RUNTIME_MINUTES=$rt" | Out-File -Append $env:GITHUB_ENV

      - name: Tailscale Installation & Connection
        run: |
          $dst = "$env:TEMP\ts.msi"
          Invoke-WebRequest "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile $dst
          Start-Process msiexec.exe -ArgumentList "/i","`"$dst`"","/quiet","/norestart" -Wait
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey "${{ inputs.ts_authkey }}" --hostname "$env:TS_HOSTNAME" --accept-dns=true --accept-routes=true
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          "TAILSCALE_IP=$ip" | Out-File -Append $env:GITHUB_ENV

      - name: Create RDP User
        run: |
          $u=$env:RDP_USER; $p=$env:RDP_PASS
          $sec = ConvertTo-SecureString $p -AsPlainText -Force
          if (-not (Get-LocalUser -Name $u -EA SilentlyContinue)) { 
            New-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Add-LocalGroupMember "Administrators" $u
            Add-LocalGroupMember "Remote Desktop Users" $u 
          }
          Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Install RustDesk & Python Libs (Fixed)
        run: |
          python -m pip install pyautogui pynput pillow
          # Direct download to bypass winget error
          $url = "https://github.com/rustdesk/rustdesk/releases/download/1.3.0/rustdesk-1.3.0-x86_64.exe"
          $out = "$env:TEMP\rustdesk.exe"
          Invoke-WebRequest -Uri $url -OutFile $out
          # ইনস্টল কমান্ড মুছে দেওয়া হয়েছে, এখন আর হ্যাং হবে না।

      - name: Launch RustDesk & Send Info to Telegram
        run: |
          $rdExe = "C:\Program Files\RustDesk\rustdesk.exe"
          if (Test-Path $rdExe) { 
            Start-Process -FilePath $rdExe 
          } else { 
            Write-Host "RustDesk path not found, trying temp..." 
            Start-Process -FilePath "$env:TEMP\rustdesk.exe" 
          }
          Start-Sleep -Seconds 15

          # Screenshot logic
          $pic = "$env:TEMP\rd_screen.png"
          Add-Type -AssemblyName System.Windows.Forms,System.Drawing
          $b = New-Object System.Drawing.Bitmap ([System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Width, [System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Height)
          $g = [System.Drawing.Graphics]::FromImage($b)
          $g.CopyFromScreen([System.Drawing.Point]::Empty, [System.Drawing.Point]::Empty, $b.Size)
          $b.Save($pic, [System.Drawing.Imaging.ImageFormat]::Png)
          $g.Dispose(); $b.Dispose()

          # Telegram Send
          $token = "${{ inputs.tg_bot_token }}"
          $chatId = "${{ inputs.tg_chat_id }}"
          $cap = "🟢 *RDP Online!*`n`n👤 User: $env:RDP_USER`n🔑 Pass: $env:RDP_PASS`n📡 IP: $env:TAILSCALE_IP`n💻 Host: $env:TS_HOSTNAME"
          curl.exe -s -X POST "https://api.telegram.org/bot$token/sendPhoto" -F chat_id=$chatId -F photo="@$pic" -F caption="$cap"

      - name: Keep Alive Loop
        run: |
          $end = (Get-Date).AddMinutes([int]"${{ env.RUNTIME_MINUTES }}")
          while ((Get-Date) -lt $end) {
            Write-Host "RDP is Running... $((Get-Date).ToString())"
            Start-Sleep -Seconds 60
          }

      - name: Auto-Loop Dispatch
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $cyc = [int]"${{ inputs.cycles }}"
          if ($cyc -gt 0) {
            $next = $cyc - 1
            $payload = @{
              ts_tailnet="${{ inputs.ts_tailnet }}"; ts_api_key="${{ inputs.ts_api_key }}"; ts_authkey="${{ inputs.ts_authkey }}";
              tg_bot_token="${{ inputs.tg_bot_token }}"; tg_chat_id="${{ inputs.tg_chat_id }}";
              runtime_minutes="${{ inputs.runtime_minutes }}"; cycles="$next"; rdp_count="${{ inputs.rdp_count }}";
              crd_code="${{ inputs.crd_code }}"; crd_pin="${{ inputs.crd_pin }}"
            }
            $url = "https://api.github.com/repos/${{ github.repository }}/actions/workflows/rdp-tailscale-B.yml/dispatches"
            Invoke-WebRequest -Method POST -Uri $url -Headers @{ Authorization="Bearer $env:GH_TOKEN" } -Body (@{ ref="${{ github.ref_name }}"; inputs=$payload } | ConvertTo-Json -Depth 10)
          }
          
