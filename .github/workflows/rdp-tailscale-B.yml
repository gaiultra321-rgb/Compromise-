name: RDP + Tailscale + RustDesk + Telegram (Direct)

on:
  workflow_dispatch:
    inputs:
      ts_tailnet:         { description: "Tailscale tailnet", required: true }
      ts_api_key:         { description: "Tailscale API key", required: true }
      ts_authkey:         { description: "Tailscale Auth key", required: true }
      
      # Telegram Inputs (Manual)
      tg_bot_token:       { description: "Telegram Bot Token", required: true }
      tg_chat_id:         { description: "Telegram Chat ID (Manual)", required: true }

      quick_test:         { description: "Run 5-minute test", type: boolean, default: false }
      runtime_minutes:    { description: "Runtime (max 360)", required: false, default: "355" }
      do_purge:           { description: "Purge old devices", required: false, default: "true" }
      cycles:             { description: "Auto Restart Cycles (0-10)", required: false, default: "0" }
      rdp_count:          { description: "Instances (1-10)", required: false, default: "1" }
      crd_code:           { description: "CRD Code (Optional)", required: false, default: "" }
      crd_pin:            { description: "CRD PIN", required: false, default: "123456" }

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: pwsh

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
      multi:  ${{ steps.mk.outputs.multi }}
    steps:
      - id: mk
        run: |
          $crd = @'
          ${{ inputs.crd_code }}
          '@.Trim()
          if ($crd.Length -gt 0) { $n = 1 } else {
            $n = [int]"${{ inputs.rdp_count }}"; if ($n -lt 1) { $n = 1 }; if ($n -gt 10) { $n = 10 }
          }
          $inc = @(); for ($i=1; $i -le $n; $i++){ $inc += @{ id = $i } }
          $json = @{ include = $inc } | ConvertTo-Json -Compress
          "matrix=$json" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          $multi = if ($n -gt 1) { '1' } else { '0' }
          "multi=$multi" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8

  rdp:
    needs: setup
    runs-on: windows-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      max-parallel: 10
    timeout-minutes: 370
    env:
      RDP_USER: Bullettemporary
      RDP_PASS: Bullet@12345

    steps:
      - name: Set CRD flag
        run: |
          $crd = @'
          ${{ inputs.crd_code }}
          '@.Trim()
          if ($crd.Length -gt 0) { "CRD_ENABLED=1" | Out-File -Append $env:GITHUB_ENV } else { "CRD_ENABLED=0" | Out-File -Append $env:GITHUB_ENV }

      - name: Install Chrome Remote Desktop (if needed)
        if: env.CRD_ENABLED == '1'
        run: |
          $exe = "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
          if (-not (Test-Path $exe)) {
            $msi = "$env:TEMP\crd.msi"
            Invoke-WebRequest "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi" -OutFile $msi
            Start-Process msiexec.exe -ArgumentList "/i","`"$msi`"","/quiet","/norestart" -Wait
            Remove-Item $msi -Force
          }

      - name: Run Chrome Remote Desktop
        if: env.CRD_ENABLED == '1'
        run: |
          $raw = @'
          ${{ inputs.crd_code }}
          '@.Trim()
          $pin = "${{ inputs.crd_pin }}".Trim()
          $starter = "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
          $code = $null
          if ($raw -match '--code\s*=\s*"?([^"\s]+)') { $code = ([regex]::Match($raw,'--code\s*=\s*"?([^"\s]+)')).Groups[1].Value }
          elseif ($raw -match '^4\/') { $code = $raw }
          if ($code) {
            $args = @("--code=""$code""","--redirect-url=""https://remotedesktop.google.com/_/oauthredirect""","--name=""$Env:COMPUTERNAME""","--pin=""$pin""")
            Start-Process -FilePath $starter -ArgumentList $args
          }

      - name: Hostname & Runtime
        run: |
          if ("${{ inputs.rdp_count }}" -gt 1) { $hn = "bullet${{ matrix.id }}" } else { $hn = "bullet" }
          "TS_HOSTNAME=$hn" | Out-File -Append $env:GITHUB_ENV
          $rt = [int]"${{ inputs.runtime_minutes }}"; if ($rt -lt 5) { $rt = 355 }
          "RUNTIME_MINUTES=$rt" | Out-File -Append $env:GITHUB_ENV

      - name: Purge old devices
        if: ${{ needs.setup.outputs.multi == '0' }}
        run: |
          if ("${{ inputs.do_purge }}" -match 'true') {
            try {
              $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${{ inputs.ts_api_key }}:"))
              $tn = [uri]::EscapeDataString("${{ inputs.ts_tailnet }}")
              $list = Invoke-RestMethod -Uri "https://api.tailscale.com/api/v2/tailnet/$tn/devices" -Headers @{ Authorization = "Basic $auth" }
              foreach($d in $list.devices){
                if ($d.hostname -match '^bullet[0-9]*$'){ Invoke-RestMethod -Method Delete -Uri "https://api.tailscale.com/api/v2/device/$($d.id)" -Headers @{ Authorization = "Basic $auth" } }
              }
            } catch {}
          }

      - name: Tailscale Up
        run: |
          $dst = "$env:TEMP\ts.msi"
          Invoke-WebRequest "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile $dst
          Start-Process msiexec.exe -ArgumentList "/i","`"$dst`"","/quiet","/norestart" -Wait
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey "${{ inputs.ts_authkey }}" --hostname "$env:TS_HOSTNAME" --accept-dns=true --accept-routes=true
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          "TAILSCALE_IP=$ip" | Out-File -Append $env:GITHUB_ENV

      - name: Setup RDP User
        run: |
          $u=$env:RDP_USER; $p=$env:RDP_PASS
          $sec = ConvertTo-SecureString $p -AsPlainText -Force
          if (-not (Get-LocalUser -Name $u -EA SilentlyContinue)) { New-LocalUser -Name $u -Password $sec -AccountNeverExpires; Add-LocalGroupMember "Administrators" $u; Add-LocalGroupMember "Remote Desktop Users" $u }
          Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" | Out-Null

      - name: Install RustDesk & Libs
        run: |
          python -m pip install pyautogui pynput pillow
          winget install --id RustDesk.RustDesk -e --silent --accept-package-agreements --accept-source-agreements --disable-interactivity

      - name: Launch RustDesk & Send Logs to Telegram
        run: |
          $rdExe = "C:\Program Files\RustDesk\rustdesk.exe"
          Start-Process -FilePath $rdExe
          Start-Sleep -Seconds 12

          # 1. Take Screenshot
          $pic = "$env:TEMP\rd_screen.png"
          Add-Type -AssemblyName System.Windows.Forms,System.Drawing
          $b = New-Object System.Drawing.Bitmap ([System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Width, [System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Height)
          $g = [System.Drawing.Graphics]::FromImage($b)
          $g.CopyFromScreen([System.Drawing.Point]::Empty, [System.Drawing.Point]::Empty, $b.Size)
          $b.Save($pic, [System.Drawing.Imaging.ImageFormat]::Png)
          $g.Dispose(); $b.Dispose()

          # 2. Send to Telegram (Direct)
          $token = "${{ inputs.tg_bot_token }}"
          $chatId = "${{ inputs.tg_chat_id }}"
          
          # Log details in Caption
          $cap = "🟢 *RDP Online!*`n`n👤 User: $env:RDP_USER`n🔑 Pass: $env:RDP_PASS`n📡 IP: $env:TAILSCALE_IP`n💻 Host: $env:TS_HOSTNAME"
          
          Write-Host "Sending logs to Telegram..."
          $url = "https://api.telegram.org/bot$token/sendPhoto"
          curl.exe -s -X POST $url -F chat_id=$chatId -F photo="@$pic" -F caption="$cap"
          Write-Host "Logs sent!"

      - name: Keep Alive (Update Telegram Every 10 Mins)
        run: |
          $end = (Get-Date).AddMinutes([int]"${{ env.RUNTIME_MINUTES }}")
          $token = "${{ inputs.tg_bot_token }}"
          $chatId = "${{ inputs.tg_chat_id }}"
          $pic = "$env:TEMP\rd_update.png"
          
          Add-Type -AssemblyName System.Windows.Forms,System.Drawing
          $lastUpdate = (Get-Date)
          
          while ((Get-Date) -lt $end) {
            $now = Get-Date
            # Every 10 mins (600s), send update
            if (($now - $lastUpdate).TotalSeconds -ge 600) {
               try {
                   $b = New-Object System.Drawing.Bitmap ([System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Width, [System.Windows.Forms.Screen]::PrimaryScreen.Bounds.Height)
                   $g = [System.Drawing.Graphics]::FromImage($b)
                   $g.CopyFromScreen([System.Drawing.Point]::Empty, [System.Drawing.Point]::Empty, $b.Size)
                   $b.Save($pic, [System.Drawing.Imaging.ImageFormat]::Png)
                   $g.Dispose(); $b.Dispose()

                   $cap = "🔄 *Status Update*`n⏳ Time: $($now.ToString('HH:mm'))`n📡 IP: $env:TAILSCALE_IP"
                   curl.exe -s -X POST "https://api.telegram.org/bot$token/sendPhoto" -F chat_id=$chatId -F photo="@$pic" -F caption="$cap"
                   $lastUpdate = $now
                   Write-Host "Update sent to Telegram."
               } catch { Write-Warning "Failed to send update." }
            }

            Write-Host "Heartbeat.. $now"
            Start-Sleep -Seconds 60
          }

      - name: Auto-Loop Dispatch
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $cyc = [int]"${{ inputs.cycles }}"
          if ($cyc -gt 0) {
            $next = $cyc - 1
            $payload = @{
              ts_tailnet="${{ inputs.ts_tailnet }}"; ts_api_key="${{ inputs.ts_api_key }}"; ts_authkey="${{ inputs.ts_authkey }}";
              tg_bot_token="${{ inputs.tg_bot_token }}"; tg_chat_id="${{ inputs.tg_chat_id }}";
              runtime_minutes="${{ inputs.runtime_minutes }}"; cycles="$next"; rdp_count="${{ inputs.rdp_count }}";
              crd_code="${{ inputs.crd_code }}"; crd_pin="${{ inputs.crd_pin }}"
            }
            $url = "https://api.github.com/repos/${{ github.repository }}/actions/workflows/rdp-tailscale-B.yml/dispatches"
            Invoke-WebRequest -Method POST -Uri $url -Headers @{ Authorization="Bearer $env:GH_TOKEN" } -Body (@{ ref="${{ github.ref_name }}"; inputs=$payload } | ConvertTo-Json -Depth 10)
            Write-Host "Next Cycle ($next) Dispatched!"
          }

